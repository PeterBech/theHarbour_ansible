ufw_enabled: true
ufw_ssh_port: 22
# NFS
nfs_ports:
  - { port: 2049, proto: tcp }
  - { port: 111, proto: tcp }
  - { port: 111, proto: udp }


local_net_cidr: 192.168.0.0/24

base_packages:
  - curl
  - ca-certificates
  - apt-transport-https
  - gnupg
  - software-properties-common
  - htop
  - vim

